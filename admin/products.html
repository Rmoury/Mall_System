<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Manage Products — SuperMall Admin</title>
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body>
<div class="app-layout">
  <aside class="sidebar">
    <div class="sidebar-logo">Super<span>Mall</span></div>
    <nav class="sidebar-nav">
      <div class="nav-section-label">Overview</div>
      <a href="dashboard.html"  class="nav-link"><span class="nav-icon">📊</span> Dashboard</a>
      <div class="nav-section-label">Management</div>
      <a href="shops.html"      class="nav-link"><span class="nav-icon">🏪</span> Shops</a>
      <a href="products.html"   class="nav-link active"><span class="nav-icon">📦</span> Products</a>
      <a href="offers.html"     class="nav-link"><span class="nav-icon">🏷️</span> Offers</a>
      <a href="categories.html" class="nav-link"><span class="nav-icon">🗂️</span> Categories & Floors</a>
      <div class="nav-section-label">Visitors</div>
      <a href="../user/browse.html" class="nav-link"><span class="nav-icon">👁️</span> User View</a>
    </nav>
    <div class="sidebar-footer">SuperMall v1.0</div>
  </aside>

  <div class="main-wrap">
    <header class="topbar">
      <span class="topbar-title">Manage Products</span>
      <div class="topbar-right">
        <span class="topbar-user" id="nav-user"></span>
        <button class="btn btn-ghost btn-sm" id="nav-logout">Logout</button>
      </div>
    </header>

    <main class="page-content">
      <div class="page-header">
        <div class="page-header-left"><h1>Products</h1><p>Manage all products across shops.</p></div>
        <button class="btn btn-primary" onclick="openForm()">+ Add Product</button>
      </div>

      <div class="filter-bar">
        <input type="text" id="search-q" class="form-control search-input" placeholder="🔍 Search products..." oninput="filterProducts()" />
        <select id="filter-shop" class="form-control" onchange="filterProducts()"><option value="">All Shops</option></select>
        <select id="filter-cat"  class="form-control" onchange="filterProducts()"><option value="">All Categories</option></select>
        <select id="filter-feat" class="form-control" onchange="filterProducts()"><option value="">All</option><option value="true">Featured</option></select>
      </div>

      <div class="card"><div class="card-body" style="padding:0" id="products-table"></div></div>
    </main>
  </div>
</div>

<!-- Product Form Modal -->
<div id="prod-modal" style="display:none">
  <div class="modal-overlay modal-show">
    <div class="modal-box" style="max-width:620px">
      <div class="modal-header">
        <h3 class="modal-title" id="form-title">Add Product</h3>
        <button class="modal-close" onclick="closeForm()">✕</button>
      </div>
      <div class="modal-body">
        <form id="prod-form">
          <input type="hidden" id="prod-id" />
          <div class="form-grid">
            <div class="form-group form-full"><label class="form-label">Product Name *</label><input id="f-name" class="form-control" required /></div>
            <div class="form-group"><label class="form-label">Shop *</label><select id="f-shop" class="form-control"></select></div>
            <div class="form-group"><label class="form-label">Category</label><select id="f-cat" class="form-control"></select></div>
            <div class="form-group"><label class="form-label">Price (₹) *</label><input id="f-price" class="form-control" type="number" /></div>
            <div class="form-group"><label class="form-label">Discount Price (₹)</label><input id="f-dprice" class="form-control" type="number" /></div>
            <div class="form-group"><label class="form-label">Stock</label><input id="f-stock" class="form-control" type="number" value="0" /></div>
            <div class="form-group"><label class="form-label">Emoji Icon</label><input id="f-image" class="form-control" placeholder="e.g. 📱" /></div>
            <div class="form-group form-full"><label class="form-label">Description</label><textarea id="f-desc" class="form-control" rows="2"></textarea></div>
            <div class="form-group"><label class="form-label">Featured?</label>
              <select id="f-feat" class="form-control"><option value="false">No</option><option value="true">Yes</option></select>
            </div>
          </div>
        </form>
      </div>
      <div class="modal-footer">
        <button class="btn btn-ghost" onclick="closeForm()">Cancel</button>
        <button class="btn btn-primary" onclick="saveProduct()">Save</button>
      </div>
    </div>
  </div>
</div>

<div id="toast-container"></div>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="../js/logger.js"></script>
<script src="../js/firebase-config.js"></script>
<script src="../js/auth.js"></script>
<script src="../js/ui.js"></script>
<script src="../js/shop.js"></script>
<script src="../js/data-services.js"></script>
<script>
  if (!Auth.requireAuth("admin")) throw new Error("Unauthorized");
  Auth.initNav();

  let allProducts = [];

  async function load() {
    allProducts = await ProductService.getAll();
    renderTable(allProducts);
    const shops = await ShopService.getAll();
    const cats  = await CategoryService.getAll();
    const fShop = document.getElementById("filter-shop");
    const fCat  = document.getElementById("filter-cat");
    const fShopForm = document.getElementById("f-shop");
    const fCatForm  = document.getElementById("f-cat");
    shops.forEach(s => { [fShop, fShopForm].forEach(el => el.innerHTML += `<option value="${s.id}" data-name="${s.name}">${s.name}</option>`); });
    cats.forEach(c  => { [fCat,  fCatForm ].forEach(el => el.innerHTML += `<option value="${c.name}">${c.name}</option>`); });
  }

  function renderTable(items) {
    UI.buildTable("products-table",
      [
        { key: "image",        label: "Icon",     render: p => `<span style="font-size:1.5rem">${p.image||"📦"}</span>` },
        { key: "name",         label: "Name",     render: p => `<strong>${p.name}</strong>` },
        { key: "shopName",     label: "Shop" },
        { key: "category",     label: "Category" },
        { key: "price",        label: "Price",    render: p => UI.currency(p.price) },
        { key: "discountPrice",label: "Sale",     render: p => p.discountPrice ? UI.currency(p.discountPrice) : "—" },
        { key: "stock",        label: "Stock" },
        { key: "featured",     label: "Featured", render: p => p.featured ? "⭐" : "—" }
      ],
      items,
      [
        { label: "Edit",   icon: "✏️", className: "btn-edit",   onClick: id => `openForm('${id}')` },
        { label: "Delete", icon: "🗑️", className: "btn-delete", onClick: id => `deleteProd('${id}')` }
      ]
    );
  }

  function filterProducts() {
    const q = document.getElementById("search-q").value.toLowerCase();
    const shop = document.getElementById("filter-shop").value;
    const cat  = document.getElementById("filter-cat").value;
    const feat = document.getElementById("filter-feat").value;
    renderTable(allProducts.filter(p => {
      return (!q || p.name.toLowerCase().includes(q))
        && (!shop || p.shopId === shop)
        && (!cat  || p.category === cat)
        && (feat === "" || String(p.featured) === feat);
    }));
  }

  async function openForm(id = null) {
    document.getElementById("form-title").textContent = id ? "Edit Product" : "Add Product";
    document.getElementById("prod-id").value = id || "";
    if (id) {
      const p = await ProductService.getById(id);
      if (p) {
        document.getElementById("f-name").value   = p.name || "";
        document.getElementById("f-shop").value   = p.shopId || "";
        document.getElementById("f-cat").value    = p.category || "";
        document.getElementById("f-price").value  = p.price || "";
        document.getElementById("f-dprice").value = p.discountPrice || "";
        document.getElementById("f-stock").value  = p.stock || 0;
        document.getElementById("f-image").value  = p.image || "";
        document.getElementById("f-desc").value   = p.description || "";
        document.getElementById("f-feat").value   = String(p.featured || false);
      }
    } else { document.getElementById("prod-form").reset(); }
    document.getElementById("prod-modal").style.display = "block";
  }

  function closeForm() { document.getElementById("prod-modal").style.display = "none"; }

  async function saveProduct() {
    const id = document.getElementById("prod-id").value;
    const shopSel = document.getElementById("f-shop");
    const shopName = shopSel.options[shopSel.selectedIndex]?.dataset.name || "";
    const data = {
      name: document.getElementById("f-name").value.trim(),
      shopId: shopSel.value,
      shopName,
      category:      document.getElementById("f-cat").value,
      price:         Number(document.getElementById("f-price").value),
      discountPrice: Number(document.getElementById("f-dprice").value) || null,
      stock:         Number(document.getElementById("f-stock").value),
      image:         document.getElementById("f-image").value.trim(),
      description:   document.getElementById("f-desc").value.trim(),
      featured:      document.getElementById("f-feat").value === "true"
    };
    if (!data.name || !data.price) { UI.toast("Name and price are required","warning"); return; }
    try {
      id ? await ProductService.update(id, data) : await ProductService.create(data);
      UI.toast(id ? "Product updated ✅" : "Product created 🎉", "success");
      closeForm(); load();
    } catch (e) { UI.toast("Error: " + e.message, "error"); }
  }

  function deleteProd(id) {
    UI.confirm("Delete this product?", async () => {
      await ProductService.remove(id);
      UI.toast("Deleted", "success"); load();
    });
  }

  load();
</script>
</body>
</html>
