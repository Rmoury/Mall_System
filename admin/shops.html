<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Manage Shops — SuperMall Admin</title>
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body>
<div class="app-layout">
  <aside class="sidebar">
    <div class="sidebar-logo">Super<span>Mall</span></div>
    <nav class="sidebar-nav">
      <div class="nav-section-label">Overview</div>
      <a href="dashboard.html"  class="nav-link"><span class="nav-icon">📊</span> Dashboard</a>
      <div class="nav-section-label">Management</div>
      <a href="shops.html"      class="nav-link active"><span class="nav-icon">🏪</span> Shops</a>
      <a href="products.html"   class="nav-link"><span class="nav-icon">📦</span> Products</a>
      <a href="offers.html"     class="nav-link"><span class="nav-icon">🏷️</span> Offers</a>
      <a href="categories.html" class="nav-link"><span class="nav-icon">🗂️</span> Categories & Floors</a>
      <div class="nav-section-label">Visitors</div>
      <a href="../user/browse.html" class="nav-link"><span class="nav-icon">👁️</span> User View</a>
    </nav>
    <div class="sidebar-footer">SuperMall v1.0</div>
  </aside>

  <div class="main-wrap">
    <header class="topbar">
      <span class="topbar-title">Manage Shops</span>
      <div class="topbar-right">
        <span class="topbar-user" id="nav-user"></span>
        <button class="btn btn-ghost btn-sm" id="nav-logout">Logout</button>
      </div>
    </header>

    <main class="page-content">
      <div class="page-header">
        <div class="page-header-left"><h1>Shops</h1><p>Create, update and manage all shops in the mall.</p></div>
        <button class="btn btn-primary" onclick="openShopForm()">+ Add Shop</button>
      </div>

      <!-- Filter bar -->
      <div class="filter-bar">
        <input type="text" id="search-input" class="form-control search-input" placeholder="🔍 Search shops..." oninput="filterShops()" />
        <select id="filter-floor" class="form-control" onchange="filterShops()"><option value="">All Floors</option></select>
        <select id="filter-category" class="form-control" onchange="filterShops()"><option value="">All Categories</option></select>
        <select id="filter-status" class="form-control" onchange="filterShops()">
          <option value="">All Status</option><option value="true">Active</option><option value="false">Inactive</option>
        </select>
      </div>

      <div class="card"><div class="card-body" style="padding:0" id="shops-table"></div></div>
    </main>
  </div>
</div>

<!-- Shop Form Modal -->
<div id="shop-form-modal" style="display:none">
  <div class="modal-overlay modal-show" id="shop-modal-overlay">
    <div class="modal-box" style="max-width:640px">
      <div class="modal-header">
        <h3 class="modal-title" id="shop-form-title">Add Shop</h3>
        <button class="modal-close" onclick="closeShopForm()">✕</button>
      </div>
      <div class="modal-body">
        <form id="shop-form" novalidate>
          <input type="hidden" id="shop-id" />
          <div class="form-grid">
            <div class="form-group"><label class="form-label">Shop Name *</label><input id="f-name" class="form-control" required /></div>
            <div class="form-group"><label class="form-label">Unit Number *</label><input id="f-unit" class="form-control" required /></div>
            <div class="form-group"><label class="form-label">Category *</label><select id="f-category" class="form-control"></select></div>
            <div class="form-group"><label class="form-label">Floor *</label><select id="f-floor" class="form-control"></select></div>
            <div class="form-group"><label class="form-label">Owner Email</label><input id="f-owner" class="form-control" type="email" /></div>
            <div class="form-group"><label class="form-label">Phone</label><input id="f-phone" class="form-control" /></div>
            <div class="form-group"><label class="form-label">Opens At</label><input id="f-open" class="form-control" type="time" value="10:00" /></div>
            <div class="form-group"><label class="form-label">Closes At</label><input id="f-close" class="form-control" type="time" value="22:00" /></div>
            <div class="form-group form-full"><label class="form-label">Description</label><textarea id="f-desc" class="form-control" rows="2"></textarea></div>
            <div class="form-group"><label class="form-label">Status</label>
              <select id="f-active" class="form-control"><option value="true">Active</option><option value="false">Inactive</option></select>
            </div>
          </div>
        </form>
      </div>
      <div class="modal-footer">
        <button class="btn btn-ghost" onclick="closeShopForm()">Cancel</button>
        <button class="btn btn-primary" onclick="saveShop()">Save Shop</button>
      </div>
    </div>
  </div>
</div>

<div id="toast-container"></div>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="../js/logger.js"></script>
<script src="../js/firebase-config.js"></script>
<script src="../js/auth.js"></script>
<script src="../js/ui.js"></script>
<script src="../js/shop.js"></script>
<script src="../js/data-services.js"></script>
<script>
  if (!Auth.requireAuth("admin")) throw new Error("Unauthorized");
  Auth.initNav();

  let allShops = [];

  async function loadShops() {
    document.getElementById("shops-table").innerHTML = '<div class="loader-wrap"><div class="loader"></div></div>';
    allShops = await ShopService.getAll();
    renderTable(allShops);
    await populateFilters();
    Logger.info("shops-page", "Shops loaded", { count: allShops.length });
  }

  function renderTable(shops) {
    UI.buildTable("shops-table",
      [
        { key: "name",     label: "Shop Name", render: s => `<strong>${s.name}</strong>` },
        { key: "category", label: "Category" },
        { key: "floor",    label: "Floor" },
        { key: "unit",     label: "Unit" },
        { key: "phone",    label: "Phone" },
        { key: "active",   label: "Status", render: s => UI.statusBadge(s.active) }
      ],
      shops,
      [
        { label: "Edit",   icon: "✏️", className: "btn-edit",   onClick: id => `openShopForm('${id}')` },
        { label: "Delete", icon: "🗑️", className: "btn-delete", onClick: id => `deleteShop('${id}')` }
      ]
    );
  }

  function filterShops() {
    const q    = document.getElementById("search-input").value.toLowerCase();
    const floor = document.getElementById("filter-floor").value;
    const cat  = document.getElementById("filter-category").value;
    const status = document.getElementById("filter-status").value;
    const filtered = allShops.filter(s => {
      const matchQ = !q || s.name.toLowerCase().includes(q) || (s.unit||"").toLowerCase().includes(q);
      const matchF = !floor  || s.floor === floor;
      const matchC = !cat    || s.category === cat;
      const matchS = status === "" || String(s.active) === status;
      return matchQ && matchF && matchC && matchS;
    });
    renderTable(filtered);
  }

  async function populateFilters() {
    const cats   = await CategoryService.getAll();
    const floors = await CategoryService.getUniqueFloors();
    const catSel = document.getElementById("filter-category");
    const floorSel = document.getElementById("filter-floor");
    const fCat  = document.getElementById("f-category");
    const fFloor = document.getElementById("f-floor");

    cats.forEach(c => {
      [catSel, fCat].forEach(el => el.innerHTML += `<option value="${c.name}">${c.icon || ""} ${c.name}</option>`);
    });
    floors.forEach(f => {
      [floorSel, fFloor].forEach(el => el.innerHTML += `<option value="${f}">${f}</option>`);
    });
  }

  async function openShopForm(id = null) {
    document.getElementById("shop-form-title").textContent = id ? "Edit Shop" : "Add Shop";
    document.getElementById("shop-id").value = id || "";
    if (id) {
      const s = await ShopService.getById(id);
      if (s) {
        document.getElementById("f-name").value     = s.name || "";
        document.getElementById("f-unit").value     = s.unit || "";
        document.getElementById("f-category").value = s.category || "";
        document.getElementById("f-floor").value    = s.floor || "";
        document.getElementById("f-owner").value    = s.owner || "";
        document.getElementById("f-phone").value    = s.phone || "";
        document.getElementById("f-open").value     = s.open || "10:00";
        document.getElementById("f-close").value    = s.close || "22:00";
        document.getElementById("f-desc").value     = s.description || "";
        document.getElementById("f-active").value   = String(s.active !== false);
      }
    } else {
      document.getElementById("shop-form").reset();
    }
    document.getElementById("shop-form-modal").style.display = "block";
  }

  function closeShopForm() {
    document.getElementById("shop-form-modal").style.display = "none";
  }

  async function saveShop() {
    const id = document.getElementById("shop-id").value;
    const data = {
      name:        document.getElementById("f-name").value.trim(),
      unit:        document.getElementById("f-unit").value.trim(),
      category:    document.getElementById("f-category").value,
      floor:       document.getElementById("f-floor").value,
      owner:       document.getElementById("f-owner").value.trim(),
      phone:       document.getElementById("f-phone").value.trim(),
      open:        document.getElementById("f-open").value,
      close:       document.getElementById("f-close").value,
      description: document.getElementById("f-desc").value.trim(),
      active:      document.getElementById("f-active").value === "true"
    };

    if (!data.name || !data.unit) { UI.toast("Shop name and unit are required", "warning"); return; }

    try {
      if (id) {
        await ShopService.update(id, data);
        UI.toast("Shop updated successfully ✅", "success");
      } else {
        await ShopService.create(data);
        UI.toast("Shop created successfully 🎉", "success");
      }
      closeShopForm();
      loadShops();
    } catch (err) {
      Logger.error("shops-page", "Save shop failed", err);
      UI.toast("Failed to save shop: " + err.message, "error");
    }
  }

  function deleteShop(id) {
    UI.confirm("Are you sure you want to delete this shop? This cannot be undone.", async () => {
      try {
        await ShopService.remove(id);
        UI.toast("Shop deleted", "success");
        loadShops();
      } catch (err) {
        UI.toast("Delete failed: " + err.message, "error");
      }
    });
  }

  loadShops();
</script>
</body>
</html>
