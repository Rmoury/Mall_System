<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Manage Offers — SuperMall Admin</title>
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body>
<div class="app-layout">
  <aside class="sidebar">
    <div class="sidebar-logo">Super<span>Mall</span></div>
    <nav class="sidebar-nav">
      <div class="nav-section-label">Overview</div>
      <a href="dashboard.html"  class="nav-link"><span class="nav-icon">📊</span> Dashboard</a>
      <div class="nav-section-label">Management</div>
      <a href="shops.html"      class="nav-link"><span class="nav-icon">🏪</span> Shops</a>
      <a href="products.html"   class="nav-link"><span class="nav-icon">📦</span> Products</a>
      <a href="offers.html"     class="nav-link active"><span class="nav-icon">🏷️</span> Offers</a>
      <a href="categories.html" class="nav-link"><span class="nav-icon">🗂️</span> Categories & Floors</a>
    </nav>
    <div class="sidebar-footer">SuperMall v1.0</div>
  </aside>

  <div class="main-wrap">
    <header class="topbar">
      <span class="topbar-title">Manage Offers</span>
      <div class="topbar-right">
        <span class="topbar-user" id="nav-user"></span>
        <button class="btn btn-ghost btn-sm" id="nav-logout">Logout</button>
      </div>
    </header>

    <main class="page-content">
      <div class="page-header">
        <div class="page-header-left"><h1>Offers</h1><p>Create and manage promotional offers for shops.</p></div>
        <button class="btn btn-primary" onclick="openForm()">+ Add Offer</button>
      </div>

      <div class="filter-bar">
        <input type="text" id="search-q" class="form-control search-input" placeholder="🔍 Search offers..." oninput="filterOffers()" />
        <select id="filter-shop" class="form-control" onchange="filterOffers()"><option value="">All Shops</option></select>
        <select id="filter-status" class="form-control" onchange="filterOffers()">
          <option value="">All</option><option value="true">Active</option><option value="false">Inactive</option>
        </select>
      </div>

      <div class="card"><div class="card-body" style="padding:0" id="offers-table"></div></div>
    </main>
  </div>
</div>

<!-- Offer Form Modal -->
<div id="offer-modal" style="display:none">
  <div class="modal-overlay modal-show">
    <div class="modal-box" style="max-width:580px">
      <div class="modal-header">
        <h3 class="modal-title" id="form-title">Add Offer</h3>
        <button class="modal-close" onclick="closeForm()">✕</button>
      </div>
      <div class="modal-body">
        <input type="hidden" id="offer-id" />
        <div class="form-grid">
          <div class="form-group form-full"><label class="form-label">Offer Title *</label><input id="f-title" class="form-control" required /></div>
          <div class="form-group"><label class="form-label">Shop *</label><select id="f-shop" class="form-control"></select></div>
          <div class="form-group"><label class="form-label">Discount (e.g. 20%)</label><input id="f-discount" class="form-control" /></div>
          <div class="form-group"><label class="form-label">Promo Code</label><input id="f-code" class="form-control" /></div>
          <div class="form-group"><label class="form-label">Valid From</label><input id="f-from" class="form-control" type="date" /></div>
          <div class="form-group"><label class="form-label">Valid To</label><input id="f-to" class="form-control" type="date" /></div>
          <div class="form-group form-full"><label class="form-label">Description</label><textarea id="f-desc" class="form-control" rows="2"></textarea></div>
          <div class="form-group"><label class="form-label">Status</label>
            <select id="f-active" class="form-control"><option value="true">Active</option><option value="false">Inactive</option></select>
          </div>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-ghost" onclick="closeForm()">Cancel</button>
        <button class="btn btn-primary" onclick="saveOffer()">Save</button>
      </div>
    </div>
  </div>
</div>

<div id="toast-container"></div>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="../js/logger.js"></script>
<script src="../js/firebase-config.js"></script>
<script src="../js/auth.js"></script>
<script src="../js/ui.js"></script>
<script src="../js/shop.js"></script>
<script src="../js/data-services.js"></script>
<script>
  if (!Auth.requireAuth("admin")) throw new Error("Unauthorized");
  Auth.initNav();
  let allOffers = [];

  async function load() {
    allOffers = await OfferService.getAll();
    renderTable(allOffers);
    const shops = await ShopService.getAll();
    [document.getElementById("filter-shop"), document.getElementById("f-shop")].forEach(el => {
      shops.forEach(s => { el.innerHTML += `<option value="${s.id}" data-name="${s.name}">${s.name}</option>`; });
    });
  }

  function renderTable(items) {
    UI.buildTable("offers-table", [
      { key: "title",    label: "Title",    render: o => `<strong>${o.title}</strong>` },
      { key: "shopName", label: "Shop" },
      { key: "discount", label: "Discount", render: o => `<span class="badge badge-orange">${o.discount} OFF</span>` },
      { key: "code",     label: "Code",     render: o => `<code style="background:var(--bg);padding:0.2rem 0.4rem;border-radius:4px;font-size:0.8rem">${o.code||"—"}</code>` },
      { key: "validTo",  label: "Expires" },
      { key: "active",   label: "Status",   render: o => UI.statusBadge(o.active) }
    ], items, [
      { label: "Toggle", icon: "🔁", className: "btn-edit",   onClick: id => `toggleOffer('${id}')` },
      { label: "Edit",   icon: "✏️", className: "btn-edit",   onClick: id => `openForm('${id}')` },
      { label: "Delete", icon: "🗑️", className: "btn-delete", onClick: id => `deleteOffer('${id}')` }
    ]);
  }

  function filterOffers() {
    const q = document.getElementById("search-q").value.toLowerCase();
    const shop   = document.getElementById("filter-shop").value;
    const status = document.getElementById("filter-status").value;
    renderTable(allOffers.filter(o =>
      (!q || o.title.toLowerCase().includes(q) || (o.shopName||"").toLowerCase().includes(q))
      && (!shop || o.shopId === shop)
      && (status === "" || String(o.active) === status)
    ));
  }

  async function openForm(id = null) {
    document.getElementById("form-title").textContent = id ? "Edit Offer" : "Add Offer";
    document.getElementById("offer-id").value = id || "";
    if (id) {
      const o = allOffers.find(x => x.id === id);
      if (o) {
        document.getElementById("f-title").value    = o.title || "";
        document.getElementById("f-shop").value     = o.shopId || "";
        document.getElementById("f-discount").value = o.discount || "";
        document.getElementById("f-code").value     = o.code || "";
        document.getElementById("f-from").value     = o.validFrom || "";
        document.getElementById("f-to").value       = o.validTo || "";
        document.getElementById("f-desc").value     = o.description || "";
        document.getElementById("f-active").value   = String(o.active !== false);
      }
    } else { document.getElementById("offer-id").value = ""; document.querySelectorAll("#offer-modal .form-control").forEach(el => el.value = ""); }
    document.getElementById("offer-modal").style.display = "block";
  }

  function closeForm() { document.getElementById("offer-modal").style.display = "none"; }

  async function saveOffer() {
    const id = document.getElementById("offer-id").value;
    const shopSel = document.getElementById("f-shop");
    const data = {
      title:       document.getElementById("f-title").value.trim(),
      shopId:      shopSel.value,
      shopName:    shopSel.options[shopSel.selectedIndex]?.dataset.name || "",
      discount:    document.getElementById("f-discount").value.trim(),
      code:        document.getElementById("f-code").value.trim().toUpperCase(),
      validFrom:   document.getElementById("f-from").value,
      validTo:     document.getElementById("f-to").value,
      description: document.getElementById("f-desc").value.trim(),
      active:      document.getElementById("f-active").value === "true"
    };
    if (!data.title) { UI.toast("Title is required","warning"); return; }
    try {
      id ? await OfferService.update(id, data) : await OfferService.create(data);
      UI.toast(id ? "Offer updated ✅" : "Offer created 🎉","success");
      closeForm(); load();
    } catch(e) { UI.toast("Error: " + e.message,"error"); }
  }

  async function toggleOffer(id) {
    const o = allOffers.find(x => x.id === id);
    if (!o) return;
    await OfferService.toggleActive(id, o.active);
    UI.toast(`Offer ${o.active ? "deactivated" : "activated"}`,"success");
    load();
  }

  function deleteOffer(id) {
    UI.confirm("Delete this offer?", async () => { await OfferService.remove(id); UI.toast("Deleted","success"); load(); });
  }

  load();
</script>
</body>
</html>
